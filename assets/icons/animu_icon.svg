<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Main background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#0d0618"/>
    </linearGradient>

    <!-- Violet-to-sakura icon gradient -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#f472b6"/>
    </linearGradient>

    <!-- Soft glow gradient for orb -->
    <radialGradient id="glowGrad" cx="50%" cy="40%" r="55%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </radialGradient>

    <!-- Sakura petal gradient -->
    <linearGradient id="petalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f9a8d4"/>
      <stop offset="100%" style="stop-color:#f472b6"/>
    </linearGradient>

    <!-- Rounded square clip -->
    <clipPath id="roundedClip">
      <rect width="1024" height="1024" rx="230" ry="230"/>
    </clipPath>

    <!-- Inner glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="28" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="230" ry="230" fill="url(#bgGrad)"/>

  <!-- Background glow orb -->
  <ellipse cx="512" cy="420" rx="420" ry="380" fill="url(#glowGrad)" clip-path="url(#roundedClip)"/>

  <!-- Subtle grid lines (anime aesthetic) -->
  <g clip-path="url(#roundedClip)" opacity="0.06" stroke="#7c3aed" stroke-width="1.5">
    <line x1="0" y1="200" x2="1024" y2="200"/>
    <line x1="0" y1="400" x2="1024" y2="400"/>
    <line x1="0" y1="600" x2="1024" y2="600"/>
    <line x1="0" y1="800" x2="1024" y2="800"/>
    <line x1="200" y1="0" x2="200" y2="1024"/>
    <line x1="400" y1="0" x2="400" y2="1024"/>
    <line x1="600" y1="0" x2="600" y2="1024"/>
    <line x1="800" y1="0" x2="800" y2="1024"/>
  </g>

  <!-- ── Torii gate silhouette ───────────────────────────────────── -->
  <g clip-path="url(#roundedClip)" filter="url(#glow)">
    <!-- Top curved beam (kasagi) -->
    <path d="M 192 310 Q 512 240 832 310 L 820 348 Q 512 280 204 348 Z"
          fill="url(#mainGrad)" opacity="0.95"/>

    <!-- Second beam (nuki) -->
    <rect x="242" y="382" width="540" height="44" rx="10" fill="url(#mainGrad)" opacity="0.9"/>

    <!-- Left pillar -->
    <rect x="242" y="382" width="56" height="340" rx="14" fill="url(#mainGrad)" opacity="0.9"/>

    <!-- Right pillar -->
    <rect x="726" y="382" width="56" height="340" rx="14" fill="url(#mainGrad)" opacity="0.9"/>
  </g>



  <!-- ── Sakura petals scattered ────────────────────────────────── -->
  <!-- Petal helper: 5-point flower approximation using ellipses rotated -->
  <!-- Petal 1 - top left -->
  <g transform="translate(268, 195) rotate(-30)" opacity="0.82" filter="url(#softGlow)">
    <ellipse cx="0" cy="-13" rx="9" ry="14" fill="url(#petalGrad)"/>
    <ellipse cx="12" cy="-4" rx="9" ry="14" fill="url(#petalGrad)" transform="rotate(72)"/>
    <ellipse cx="8" cy="11" rx="9" ry="14" fill="url(#petalGrad)" transform="rotate(144)"/>
    <ellipse cx="-8" cy="11" rx="9" ry="14" fill="url(#petalGrad)" transform="rotate(216)"/>
    <ellipse cx="-12" cy="-4" rx="9" ry="14" fill="url(#petalGrad)" transform="rotate(288)"/>
    <circle cx="0" cy="0" r="5" fill="#fce7f3"/>
  </g>

  <!-- Petal 2 - top right -->
  <g transform="translate(762, 178) rotate(20)" opacity="0.75" filter="url(#softGlow)">
    <ellipse cx="0" cy="-11" rx="7" ry="11" fill="url(#petalGrad)"/>
    <ellipse cx="10" cy="-3" rx="7" ry="11" fill="url(#petalGrad)" transform="rotate(72)"/>
    <ellipse cx="7" cy="9" rx="7" ry="11" fill="url(#petalGrad)" transform="rotate(144)"/>
    <ellipse cx="-7" cy="9" rx="7" ry="11" fill="url(#petalGrad)" transform="rotate(216)"/>
    <ellipse cx="-10" cy="-3" rx="7" ry="11" fill="url(#petalGrad)" transform="rotate(288)"/>
    <circle cx="0" cy="0" r="4" fill="#fce7f3"/>
  </g>

  <!-- Petal 3 - bottom right -->
  <g transform="translate(800, 780) rotate(55)" opacity="0.65" filter="url(#softGlow)">
    <ellipse cx="0" cy="-10" rx="7" ry="11" fill="url(#petalGrad)"/>
    <ellipse cx="10" cy="-3" rx="7" ry="11" fill="url(#petalGrad)" transform="rotate(72)"/>
    <ellipse cx="7" cy="9" rx="7" ry="11" fill="url(#petalGrad)" transform="rotate(144)"/>
    <ellipse cx="-7" cy="9" rx="7" ry="11" fill="url(#petalGrad)" transform="rotate(216)"/>
    <ellipse cx="-10" cy="-3" rx="7" ry="11" fill="url(#petalGrad)" transform="rotate(288)"/>
    <circle cx="0" cy="0" r="4" fill="#fce7f3"/>
  </g>

  <!-- Petal 4 - bottom left small -->
  <g transform="translate(215, 800) rotate(-15)" opacity="0.60">
    <ellipse cx="0" cy="-8" rx="6" ry="9" fill="url(#petalGrad)"/>
    <ellipse cx="8" cy="-2" rx="6" ry="9" fill="url(#petalGrad)" transform="rotate(72)"/>
    <ellipse cx="5" cy="7" rx="6" ry="9" fill="url(#petalGrad)" transform="rotate(144)"/>
    <ellipse cx="-5" cy="7" rx="6" ry="9" fill="url(#petalGrad)" transform="rotate(216)"/>
    <ellipse cx="-8" cy="-2" rx="6" ry="9" fill="url(#petalGrad)" transform="rotate(288)"/>
    <circle cx="0" cy="0" r="3" fill="#fce7f3"/>
  </g>

  <!-- ── App name: Animu ─────────────────────────────────────────── -->
  <text
    x="512" y="870"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="112"
    font-weight="900"
    text-anchor="middle"
    letter-spacing="-2"
    fill="url(#mainGrad)"
    filter="url(#glow)"
    clip-path="url(#roundedClip)"
  >animu</text>

  <!-- Japanese subtitle -->
  <text
    x="512" y="930"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="36"
    font-weight="400"
    text-anchor="middle"
    letter-spacing="12"
    fill="#f472b6"
    opacity="0.6"
    clip-path="url(#roundedClip)"
  >アニム</text>

  <!-- Subtle border ring -->
  <rect x="18" y="18" width="988" height="988" rx="218" ry="218"
        fill="none" stroke="url(#mainGrad)" stroke-width="3" opacity="0.25"
        clip-path="url(#roundedClip)"/>
</svg>
